<!DOCTYPE html>
<html>

<head>
    <title>My Cart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }

        .cart-box {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #1e3a5f;
        }

        .item {
            border-bottom: 1px solid #ddd;
            padding: 10px;
        }

        .total {
            color: green;
            font-size: 25px;
            font-weight: bold;
        }

        .btn {
            background: teal;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>

</head>

<body>

    <h1>My Shopping Cart</h1>

    <div class="cart-box">

        {% for item in cart %}

        <div class="item">

            <h3>{{ item.name }}</h3>

            <p>Price: ₹{{ item.price }}</p>

            <p>Quantity: {{ item.quantity }}</p>

            <p>Subtotal: ₹{{ item.subtotal }}</p>
            <a href="/remove/{{ item.id }}">
                <button>Remove</button>
            </a>
            {% endfor %}

        </div>

        <br>

        <h2 class="total">
            Total = ₹{{ total }}
        </h2>

        <br>
        <a href="/bill" class="btn">
            Generate Bill
        </a>

        <a href="/clear_cart">
            <button>Clear Cart</button>
        </a>


    </div>

</body>

</html>
