<!DOCTYPE html>

<html>

<head>
    <title>Dashboard</title>


    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: teal;
        }

        .top-buttons {
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 280px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px gray;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
        }



        .category-buttons {
            text-align: center;
            margin: 20px;
        }

        .cat-btn {
            display: inline-block;
            background-color: teal;
            color: white;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .cat-btn:hover {
            background: #006666;
            transform: scale(1.05);
        }



        button {
            background-color: teal;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
        }
    </style>


</head>

<body>


    <h1>Ramya Super Market Dashboard</h1>

    <h3>
        Total Products: {{ products|length }}
    </h3>

    <form method="GET" action="/dashboard">

        <select name="sort">

            <option value="">
                Sort Products
            </option>

            <option value="low">
                Price Low → High
            </option>

            <option value="high">
                Price High → Low
            </option>

            <option value="name">
                Name A → Z
            </option>

        </select>

        <button type="submit">
            Sort
        </button>

    </form>
    <input type="text" name="search" placeholder="Search Product">

    <button type="submit">
        Search
    </button>

    </form>
    <br>

    <div class="category-buttons">

        <a href="/dashboard" class="cat-btn">🏪 All</a>

        <a href="/dashboard?category=Grocery" class="cat-btn">🛒 Grocery</a>

        <a href="/dashboard?category=Fruits" class="cat-btn">🍎 Fruits</a>

        <a href="/dashboard?category=Vegetables" class="cat-btn">🥕 Vegetables</a>

        <a href="/dashboard?category=Dairy" class="cat-btn">🥛 Dairy</a>

        <a href="/dashboard?category=Fashion" class="cat-btn">👗 Fashion</a>

        <a href="/dashboard?category=Dry Fruits" class="cat-btn">🥜 Dry Fruits</a>

        <a href="/dashboard?category=Snacks" class="cat-btn">🍫 Snacks</a>

        <a href="/dashboard?category=Beverages" class="cat-btn">🥤 Beverages</a>

        <a href="/dashboard?category=Spices" class="cat-btn">🌶️ Spices</a>s

    </div>

    <br><br>

    <br>

    <div class="top-buttons">

        <a href="/cart">
            <button>View Cart</button>
        </a>

        <a href="/analytics">
            <button>Sales Analytics</button>
        </a>

        <a href="/admin">
            <button>Admin Panel</button>
        </a>

        <a href="/logout" onclick="return confirm('Logout?')">
            <button>Logout</button>
        </a>
        <a href="/history">
            <button>
                Purchase History
            </button>
        </a>


    </div>

    <div class="container">

        {% for product in products %}

        <div class="card">

            <img src="{{ url_for('static',
    filename='images/' + product['image']) }}">

            <h3>{{ product['name'] }}</h3>

            <p>Stock: {{ product['stock'] }}</p>

            <p>₹{{ product['price'] }}</p>

            <form action="/add_to_cart/{{ product['id'] }}" method="POST">

                <label>Quantity:</label>

                <input type="number" name="quantity" value="1" min="1">

                <br><br>

                <button type="submit">
                    Add To Cart
                </button>

            </form>

            <br>

            <form action="/buy_now/{{ product['id'] }}" method="POST">

                <input type="hidden" name="quantity" value="1">

                <button type="submit">
                    Buy Now
                </button>

            </form>

        </div>

        {% endfor %}

    </div>


</body>

</html>
