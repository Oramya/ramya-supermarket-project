<!DOCTYPE html>

<html>

<head>
    <title>Dashboard</title>


    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: teal;
        }

        .top-buttons {
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            width: 250px;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0px 0px 10px gray;
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            background-color: teal;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
        }
    </style>


</head>

<body>


    <h1>Ramya Super Market Dashboard</h1>
    <form method="GET" action="/dashboard">

        <input type="text" name="search" placeholder="Search Product">

        <button type="submit">
            Search
        </button>

    </form>
    <br>

    <a href="/dashboard">
        <button>All</button>
    </a>

    <a href="/dashboard?category=Grocery">
        <button>Grocery</button>
    </a>

    <a href="/dashboard?category=Snacks">
        <button>Snacks</button>
    </a>

    <br><br>

    <br>

    <div class="top-buttons">

        <a href="/cart">
            <button>View Cart</button>
        </a>

        <a href="/analytics">
            <button>Sales Analytics</button>
        </a>

        <a href="/admin">
            <button>Admin Panel</button>
        </a>

        <a href="/logout" onclick="return confirm('Logout?')">
            <button>Logout</button>
        </a>
        <a href="/history">
            <button>
                Purchase History
            </button>
        </a>


    </div>

    <div class="container">

        {% for product in products %}

        <div class="card">

            {% if 'image' in product %}
            <img src="{{ url_for('static', filename='images/' + product['image']) }}" alt="{{ product['name'] }}">
            {% else %}
            <p>No Image</p>
            {% endif %}

            <h3>{{ product.name }}</h3>

            <h2>₹{{ product.price }}</h2>

            <form action="/add_to_cart/{{ product.id }}" method="POST">

                <label>Quantity:</label>
                <br>

                <input type="number" name="quantity" value="1" min="1">

                <br><br>

                <button type="submit">
                    Add To Cart
                </button>

            </form>

            <br>
            <form action="/buy_now/{{ product.id }}" method="POST">

                <input type="number" name="quantity" value="1" min="1">

                <br><br>

                <button type="submit">
                    Buy Now
                </button>

            </form>

        </div>

        {% endfor %}

    </div>


</body>

</html>
